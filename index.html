<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inside the Finance World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-orb orb-a" aria-hidden="true"></div>
    <div class="bg-orb orb-b" aria-hidden="true"></div>

    <main class="app-shell">
      <section class="episodes-card">
        <div class="now-playing">
          <img class="cover-art" src="img/IMG_9712.png" alt="Cover podcast" />
          <div class="now-playing-text">
            <span class="badge">En lecture</span>
            <h2 id="episode-title">Épisode 1 - Audit (ITFW)</h2>
            <p id="episode-meta">Pret a demarrer</p>
          </div>
        </div>

        <audio id="audio-player" controls preload="metadata"></audio>

        <div class="player-controls">
          <button id="prev-btn" class="btn" type="button">Precedent</button>
          <button id="play-pause-btn" class="btn btn-primary" type="button">Play / Pause</button>
          <button id="next-btn" class="btn" type="button">Suivant</button>
          <button id="refresh-btn" class="btn" type="button">Rafraichir</button>
        </div>

        <label class="toggle-row">
          <input id="auto-next" type="checkbox" checked />
          <span>Lecture automatique</span>
        </label>

        <p id="status" class="status" role="status" aria-live="polite">Initialisation...</p>

        <ul id="episodes-list" class="episodes-list"></ul>
      </section>

      <section class="description-card">
        <h3 class="description-title">Description</h3>
        <p id="episode-description" class="episode-description-main"></p>
        <a
          id="questionnaire-btn"
          class="btn btn-primary cta-btn"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >
          Cliquer ici pour repondre au questionnaire
        </a>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
